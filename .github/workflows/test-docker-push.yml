name: Test Docker Push

# Quick test to verify Docker Hub credentials work
# This takes ~30 seconds instead of 30 minutes

on:
  workflow_dispatch:
    inputs:
      docker_repo:
        description: 'Docker repository (e.g., cgins0023/metabase)'
        required: true
      docker_tag:
        description: 'Docker tag to test with'
        required: true
        default: 'test'

jobs:
  test-push:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Create dummy Dockerfile
        run: |
          mkdir -p test-context
          cat > test-context/Dockerfile <<'EOF'
          FROM alpine:latest
          RUN echo "Docker credentials test - this image does nothing"
          CMD ["echo", "Test successful"]
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Test build and push
        uses: docker/build-push-action@v6
        with:
          context: test-context
          push: true
          tags: ${{ inputs.docker_repo }}:${{ inputs.docker_tag }}
          platforms: linux/amd64

      - name: Success message
        run: |
          echo "✅ SUCCESS! Docker credentials work!"
          echo "Image pushed: ${{ inputs.docker_repo }}:${{ inputs.docker_tag }}"
          echo ""
          echo "You can now safely run the full build workflow."
          echo "After testing, delete this test image from Docker Hub."
